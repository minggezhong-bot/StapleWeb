<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard — Staple Web</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <a href="index.html">START</a>
    <a href="directory.html">DIRECTORY</a>
    <a href="archive.html">ARCHIVE</a>
    <a href="map.html">MAP</a>
    <a href="clipboard.html">CLIPBOARD</a>
  </nav>

  <main class="page">
    <h1 class="page-title">CLIPBOARD</h1>
    <p class="page-intro">
      A collection of audience answers, questions, and traces left through the interaction.
    </p>

    <section class="clipboard-list" id="clipboardList">
      <div class="clip-note">
        <div class="meta">Sample</div>
        <div class="note">A surface keeps what people try to remove.</div>
      </div>

      <div class="clip-note">
        <div class="meta">Sample</div>
        <div class="note">What remains after language disappears?</div>
      </div>
    </section>
  </main>

  <script>
    window.addEventListener('load', () => {
      const list = document.getElementById('clipboardList');
      const savedAnswers = JSON.parse(localStorage.getItem('clipboardAnswers') || '[]');

      savedAnswers.forEach((item) => {
        const block = document.createElement('div');
        block.className = 'clip-note';
        block.innerHTML = `
          <div class="meta">Audience Trace</div>
          <div class="note">${item}</div>
        `;
        list.appendChild(block);
      });
    });
  </script>

</body>
</html>
